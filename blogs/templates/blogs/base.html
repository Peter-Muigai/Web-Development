<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Blog</title>

    <!-- Bootstrap 4 CDN -->
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <!-- Custom Styling (Blue + Green Theme) -->
    <style>
        body {
            background-color: #f4f8fb;
        }

        .navbar {
            background: linear-gradient(90deg, #007bff, #28a745);
        }

        .navbar-brand, .nav-link, .navbar-text {
            color: white !important;
        }

        .nav-link:hover {
            opacity: 0.85;
        }

        .card {
            border-left: 5px solid #28a745;
            border-radius: 10px;
        }

        .btn-primary {
            background-color: #007bff;
            border: none;
        }

        .btn-success {
            background-color: #28a745;
            border: none;
        }

        .btn-primary:hover,
        .btn-success:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <a class="navbar-brand" href="{% url 'blogs:index' %}">
        Personal Blog
    </a>

    <!-- Toggler for mobile -->
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">

        <ul class="navbar-nav mr-auto">
            <li class="nav-item">
                <a class="nav-link" href="{% url 'blogs:posts' %}">
                    Posts
                </a>
            </li>
        </ul>

        <ul class="navbar-nav ml-auto">

            {% if user.is_authenticated %}

                <li class="nav-item">
                    <span class="navbar-text mr-3">
                        Hello, {{ user.username }}
                    </span>
                </li>

                <li class="nav-item">
                    <form method="post" action="{% url 'users:logout' %}" class="form-inline">
                        {% csrf_token %}
                        <button type="submit"
                                class="nav-link btn btn-link"
                                style="color: white; text-decoration: none;">
                            Logout
                        </button>
                    </form>
                </li>

            {% else %}

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'users:login' %}">
                        Login
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'users:register' %}">
                        Register
                    </a>
                </li>

            {% endif %}

        </ul>

    </div>
</nav>

<!-- MAIN CONTENT -->
<div class="container mt-4">
    {% block content %}{% endblock content %}
</div>

<!-- Bootstrap JS (required for navbar toggle) -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
